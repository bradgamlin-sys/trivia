<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bald Guy Trivia Scoreboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root {
      --bg: #050505;
      --panel: #121212;
      --panel-2: #1a1a1a;
      --line: #2d2d2d;
      --text: #f5f5f5;
      --muted: #b8b8b8;
      --accent: #f5c542;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding: 20px;
    }

    .display-wrap, .host-wrap {
      max-width: 1500px;
      margin: 0 auto;
    }

    .title {
      text-align: center;
      font-size: clamp(2.4rem, 5.8vw, 4.5rem);
      font-weight: 800;
      color: var(--accent);
      margin: 8px 0 6px;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.3rem);
      margin-bottom: 18px;
    }

    .board {
      background: linear-gradient(180deg, #181818, #0d0d0d);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0,0,0,0.35);
    }

    .board-header,
    .board-row {
      display: grid;
      grid-template-columns: 90px 1.8fr repeat(7, 1fr) 1fr;
      gap: 8px;
      align-items: center;
      padding: 14px 16px;
    }

    .board-header {
      background: #202020;
      font-weight: 700;
      color: var(--accent);
      border-bottom: 1px solid var(--line);
      font-size: clamp(0.9rem, 1.5vw, 1.2rem);
    }

    .board-row {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: clamp(1.1rem, 2vw, 1.7rem);
      min-height: 70px;
    }

    .board-row:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }

    .rank {
      font-weight: 800;
      font-size: clamp(1.2rem, 2.3vw, 1.9rem);
    }

    .team-name {
      font-weight: 700;
      word-break: break-word;
      font-size: clamp(1.15rem, 2.1vw, 1.8rem);
    }

    .total-cell {
      font-weight: 800;
      color: var(--accent);
      font-size: clamp(1.2rem, 2.2vw, 1.9rem);
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 48px 20px;
      font-size: 1.2rem;
    }

    .host-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .host-top {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #2f2f2f;
      color: var(--text);
      border: 1px solid #444;
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    .host-note {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .restore-note {
      color: #9ed89e;
      font-size: 0.95rem;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1050px;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #1f1f1f;
      color: var(--accent);
      z-index: 2;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: center;
      vertical-align: middle;
    }

    td:nth-child(2), th:nth-child(2) {
      text-align: left;
      min-width: 200px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 1rem;
      outline: none;
    }

    input[type="number"] {
      text-align: center;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .total-host {
      font-weight: 800;
      color: var(--accent);
    }

    .leaderboard-mini {
      min-width: 0;
    }

    .leaderboard-mini .board-header,
    .leaderboard-mini .board-row {
      grid-template-columns: 72px 1.6fr 100px;
      padding: 12px 14px;
    }

    .leaderboard-mini .board-row {
      font-size: clamp(1.1rem, 1.8vw, 1.55rem);
      min-height: 62px;
    }

    .leaderboard-mini .team-name {
      font-size: clamp(1.1rem, 1.7vw, 1.5rem);
    }

    .leaderboard-mini .rank,
    .leaderboard-mini .total-cell {
      font-size: clamp(1.15rem, 1.9vw, 1.65rem);
    }

    @media (max-width: 1100px) {
      .two-col { grid-template-columns: 1fr; }
      .leaderboard-mini .board-header,
      .leaderboard-mini .board-row {
        grid-template-columns: 72px 1.6fr 90px;
      }
    }

    @media (max-width: 900px) {
      .page { padding: 12px; }
      .board-header,
      .board-row {
        grid-template-columns: 70px 1.4fr repeat(7, 0.95fr) 0.95fr;
        gap: 6px;
        padding: 10px 8px;
      }
    }

 .final-reveal-stage {
  min-height: 68vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 14px;
}

.final-reveal-row {
  display: grid;
  grid-template-columns: 140px 1fr 160px;
  align-items: center;
  gap: 20px;
  background: linear-gradient(180deg, #181818, #0d0d0d);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px 24px;
  font-size: clamp(1.8rem, 3.4vw, 3.4rem);
  box-shadow: 0 8px 28px rgba(0,0,0,0.3);
}

.final-reveal-place {
  color: var(--accent);
  font-weight: 900;
}

.final-reveal-team {
  font-weight: 800;
  word-break: break-word;
}

.final-reveal-total {
  color: var(--accent);
  font-weight: 900;
  text-align: right;
}

.final-reveal-controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
}
 .logo-container {
  text-align: center;
  margin-bottom: 10px;
}

.logo {
  max-height: 140px;
  max-width: 400px;
  width: auto;
}
.header-brand {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin: 10px 0;
}

.logo-side {
  height: 90px;
  width: auto;
}
  </style>
</head>
<body>
  <div id="app" class="page"></div>

  <script>
    const socket = io();
    const params = new URLSearchParams(window.location.search);
    const isHost = params.get("view") === "host";
    const isFinal = params.get("view") === "final";
    const isShow = params.get("view") === "show";
const isControl = params.get("view") === "control";
   const ROUND_COUNT = 7;
const STORAGE_KEY = "baldGuyTriviaScoreboardData_v1";

let currentSlideIndex = 0;
const rounds = [
  {
    round: 1,
    title: "Knowledge Casserole",
    questions: [
      {
        question: "What animal was found hiding in a stuffed animal display?",
        answer: "Opossum"
      },
      {
        question: "What escaped on a flight from Cancun to London?",
        answer: "A venomous snake"
      }
    ]
  },
  {
    round: 2,
    title: "Ocho test round",
    questions: [
      {
        question: "What did a Waymo cab drive onto?",
        answer: "Railroad tracks"
      }
    ]
  }
];
function buildSlidesFromRounds(rounds) {
  let generatedSlides = [];

  // First: all round question sections
  rounds.forEach(round => {
    generatedSlides.push({
      type: "title",
      round: round.round,
      title: round.title
    });

    round.questions.forEach((item, index) => {
      generatedSlides.push({
        type: "question",
        round: round.round,
        roundTitle: round.title,
        number: index + 1,
        question: item.question,
        answer: item.answer
      });
    });
  });

  // Then: all round answer sections
  rounds.forEach(round => {
    generatedSlides.push({
      type: "title",
      round: round.round,
      title: `${round.title} Answers`
    });

    round.questions.forEach((item, index) => {
      generatedSlides.push({
        type: "answerQuestion",
        round: round.round,
        roundTitle: round.title,
        number: index + 1,
        question: item.question,
        answer: item.answer
      });

      generatedSlides.push({
        type: "answerReveal",
        round: round.round,
        roundTitle: round.title,
        number: index + 1,
        question: item.question,
        answer: item.answer
      });
    });
  });

  return generatedSlides;
}
function buildSlidesFromRows(rows) {
  const groupedRounds = [];

  rows.forEach(row => {
    let round = groupedRounds.find(r => r.round === Number(row.roundOrder));

    if (!round) {
      round = {
        round: Number(row.roundOrder),
        title: row.round,
        questions: []
      };
      groupedRounds.push(round);
    }

    round.questions.push({
      type: row.type,
      question: row.question,
      answer: row.answer,
      media: row.media
    });
  });

  groupedRounds.sort((a, b) => a.round - b.round);

  return buildSlidesFromRounds(groupedRounds);
}
let slides = buildSlidesFromRounds(rounds);


let teams = [];
   
    let draftTeams = [];
    let suppressIncomingUntil = 0;
    let lastRestoreMessage = "";

    function blankRounds() {
      return Array.from({ length: ROUND_COUNT }, () => 0);
    }

    function normalizeTeam(team, idx = 0) {
      let rounds = Array.isArray(team?.rounds) ? team.rounds.slice(0, ROUND_COUNT) : [];
      while (rounds.length < ROUND_COUNT) rounds.push(0);
      rounds = rounds.map(v => Number(v) || 0);
      return {
        id: team?.id || `${Date.now()}-${Math.random().toString(36).slice(2, 8)}-${idx}`,
        name: typeof team?.name === "string" ? team.name : `Team ${idx + 1}`,
        rounds
      };
    }

    function totalFor(team) {
      return (team.rounds || []).reduce((sum, val) => sum + (Number(val) || 0), 0);
    }

    function sortedTeams(source) {
      return [...source]
        .map(t => ({ ...t, total: totalFor(t) }))
        .sort((a, b) => {
          if (b.total !== a.total) return b.total - a.total;
          return a.name.localeCompare(b.name);
        });
    }

    function ascendingTeams(source) {
  return [...source]
    .map(t => ({ ...t, total: totalFor(t) }))
    .sort((a, b) => {
      if (a.total !== b.total) return a.total - b.total;
      return a.name.localeCompare(b.name);
    });
}

function getOrdinalSuffix(n) {
  if (n % 100 >= 11 && n % 100 <= 13) return "th";
  switch (n % 10) {
    case 1: return "st";
    case 2: return "nd";
    case 3: return "rd";
    default: return "th";
  }
}
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (m) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[m]));
    }

    function saveLocalCopy() {
      if (!isHost) return;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(draftTeams));
      } catch (e) {}
    }

    function loadLocalCopy() {
      if (!isHost) return [];
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.map((t, i) => normalizeTeam(t, i));
      } catch (e) {
        return [];
      }
    }

    function syncDraftFromTeams() {
      draftTeams = teams.map((t, i) => normalizeTeam(t, i));
      saveLocalCopy();
    }

    function emitTeams() {
      saveLocalCopy();
      suppressIncomingUntil = Date.now() + 1200;
      socket.emit("updateTeams", draftTeams.map((t, i) => normalizeTeam(t, i)));
    }

    function addTeam() {
      const nextNum = draftTeams.length + 1;
      draftTeams.push(normalizeTeam({ name: `Team ${nextNum}`, rounds: blankRounds() }, nextNum));
      saveLocalCopy();
      render();
      emitTeams();
    }

    function resetScores() {
      if (!confirm("Clear all teams and scores?")) return;
      draftTeams = [];
      saveLocalCopy();
      render();
      emitTeams();
    }

    function updateDraftName(id, value) {
      const team = draftTeams.find(t => t.id === id);
      if (!team) return;
      team.name = value;
      saveLocalCopy();
    }

    function updateDraftRound(id, roundIndex, value) {
      const team = draftTeams.find(t => t.id === id);
      if (!team) return;
      team.rounds[roundIndex] = value === "" ? 0 : (parseFloat(value) || 0);
      saveLocalCopy();
    }

    function deleteTeam(id) {
      draftTeams = draftTeams.filter(t => t.id !== id);
      saveLocalCopy();
      render();
      emitTeams();
    }

    function restoreFromLocalIfNeeded() {
      if (!isHost) return;
      const localTeams = loadLocalCopy();
      if (!localTeams.length) return;

      if (!teams.length) {
        draftTeams = localTeams;
        lastRestoreMessage = "Restored scores from this device.";
        render();
        emitTeams();
        return;
      }

      draftTeams = teams.map((t, i) => normalizeTeam(t, i));
      saveLocalCopy();
    }
let finalRevealCount = 1;

function renderFinalReveal() {
  const ranked = ascendingTeams(teams);
  const visibleTeams = ranked.slice(0, finalRevealCount).reverse();

  const rows = visibleTeams.length
    ? visibleTeams.map((team, i) => {
      const place = ranked.length - (visibleTeams.length - 1 - i);

      return `
        <div class="final-reveal-row">
          <div class="final-reveal-place">${place}${getOrdinalSuffix(place)}</div>
          <div class="final-reveal-team">${escapeHtml(team.name)}</div>
          <div class="final-reveal-total">${team.total}</div>
        </div>
      `;
    }).join("")
    : `<div class="empty-state">Waiting for teams…</div>`;

  return `
    <div class="display-wrap">
      <div class="logo-container">
 
<div class="header-brand">
  <img src="bg.png" alt="Logo" class="logo-side">

  <div class="title">Bald Guy Trivia</div>

  <img src="bg.png" alt="Logo" class="logo-side">
</div>
      <div class="subtitle">Last Place to First Place</div>

      <div class="final-reveal-controls">
        <button onclick="revealNextTeam()">Reveal Next Team</button>
        <button class="secondary" onclick="resetFinalReveal()">Reset Reveal</button>
      </div>

      <div class="final-reveal-stage">
        ${rows}
      </div>
    </div>
  `;
}

function revealNextTeam() {
  finalRevealCount++;
  render();
}

function resetFinalReveal() {
  finalRevealCount = 1;
  render();
}
  
    function renderDisplay() {
      const ranked = sortedTeams(teams);
      const rows = ranked.length
        ? ranked.map((team, i) => `
          <div class="board-row">
            <div class="rank">#${i + 1}</div>
            <div class="team-name">${escapeHtml(team.name)}</div>
            ${team.rounds.map(score => `<div>${score}</div>`).join("")}
            <div class="total-cell">${team.total}</div>
          </div>
        `).join("")
        : `<div class="empty-state">Waiting for teams…</div>`;

      return `
        <div class="display-wrap">
          <div class="logo-container">
 
<div class="header-brand">
  <img src="bg.png" alt="Logo" class="logo-side">

  <div class="title">Bald Guy Trivia</div>

  <img src="bg.png" alt="Logo" class="logo-side">
</div>
          <div class="subtitle">Live Leaderboard</div>
          <div class="board">
            <div class="board-header">
              <div>Rank</div>
              <div>Team</div>
              <div>R1</div>
              <div>R2</div>
              <div>R3</div>
              <div>R4</div>
              <div>R5</div>
              <div>R6</div>
              <div>R7</div>
              <div>Total</div>
            </div>
            ${rows}
          </div>
        </div>
      `;
    }

    function renderHost() {
      const ranked = sortedTeams(draftTeams);

      const rows = ranked.length
        ? ranked.map((team, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>
              <input
                type="text"
                value="${escapeHtml(team.name)}"
                oninput="updateDraftName('${team.id}', this.value)"
                onchange="emitTeams()"
                onblur="emitTeams()"
              />
            </td>
            ${team.rounds.map((score, roundIndex) => `
              <td>
                <input
                  type="number"
                  inputmode="numeric"
                  step="0.5"
                  value="${score}"
                  oninput="updateDraftRound('${team.id}', ${roundIndex}, this.value)"
                  onchange="emitTeams()"
                  onblur="emitTeams()"
                />
              </td>
            `).join("")}
            <td><span class="total-host">${team.total}</span></td>
            <td>
              <button class="danger" onclick="deleteTeam('${team.id}')">Delete</button>
            </td>
          </tr>
        `).join("")
        : `<tr><td colspan="11" style="padding:24px;color:var(--muted);">No teams yet. Click Add Team.</td></tr>`;

      const miniRows = ranked.length
        ? ranked.map((team, i) => `
          <div class="board-row">
            <div class="rank">#${i + 1}</div>
            <div class="team-name">${escapeHtml(team.name)}</div>
            <div class="total-cell">${team.total}</div>
          </div>
        `).join("")
        : `<div class="empty-state">No teams yet.</div>`;

      return `
        <div class="host-wrap">
         
<div class="title">Bald Guy Trivia</div>
          <div class="subtitle">Host Control</div>

          <div class="host-top">
            <div class="controls">
              <button onclick="addTeam()">Add Team</button>
              <button class="secondary" onclick="emitTeams()">Save / Push Updates</button>
              <button class="danger" onclick="resetScores()">Clear All</button>
            </div>
            <div class="host-note">7 rounds + total. Type scores directly. Host leaderboard is auto-sorted.</div>
          </div>

          ${lastRestoreMessage ? `<div class="restore-note">${escapeHtml(lastRestoreMessage)}</div>` : ""}

          <div class="two-col">
            <div class="panel">
              <table>
                <thead>
                  <tr>
                    <th>Rank</th>
                    <th>Team</th>
                    <th>R1</th>
                    <th>R2</th>
                    <th>R3</th>
                    <th>R4</th>
                    <th>R5</th>
                    <th>R6</th>
                    <th>R7</th>
                    <th>Total</th>
                    <th>Delete</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows}
                </tbody>
              </table>
            </div>

            <div class="board leaderboard-mini">
              <div class="board-header">
                <div>Rank</div>
                <div>Team</div>
                <div>Total</div>
              </div>
              ${miniRows}
            </div>
          </div>
        </div>
      `;
    }
    function getCurrentSlideIndex() {
  return Number(localStorage.getItem("bgtCurrentSlideIndex") || 0);
}

function setCurrentSlideIndex(index) {
  localStorage.setItem("bgtCurrentSlideIndex", index);
}
function renderShow() {
  currentSlideIndex = getCurrentSlideIndex();
  const currentSlide = slides[currentSlideIndex];

  if (currentSlide.type === "title") {
    return `
      <div style="min-height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;flex-direction:column">
        <div style="font-size:2rem;color:#f5c542;margin-bottom:20px">
          ROUND ${currentSlide.round}
        </div>
        <div style="font-size:6rem;font-weight:bold">
          ${currentSlide.title}
        </div>
      </div>
    `;
  }

  const isAnswerMode =
    currentSlide.type === "answerQuestion" ||
    currentSlide.type === "answerReveal";

const visibleSlides = slides.filter((slide, index) => {
  if (index > currentSlideIndex) return false;
  if (slide.round !== currentSlide.round) return false;

  if (!isAnswerMode) {
    return slide.type === "question";
  }

  return (
    slide.type === "answerQuestion" ||
    slide.type === "answerReveal"
  );
});

  return `
    <div style="min-height:100vh;padding:60px;text-align:left">
      <div style="font-size:2rem;color:#f5c542;margin-bottom:30px;text-align:center">
        ROUND ${currentSlide.round} ${isAnswerMode ? "ANSWERS" : ""}
      </div>

      <div style="font-size:clamp(1.2rem, 2.6vw, 2.4rem);max-width:1400px;margin:0 auto;line-height:1.18">
       ${visibleSlides.map(slide => `
  <div style="margin-bottom:18px">
    ${
      slide.type === "answerReveal"
        ? `<div style="color:#f5c542;margin-left:45px"><strong>A.</strong> ${slide.answer}</div>`
        : `<strong>${slide.number}.</strong> ${slide.question}`
    }
  </div>
`).join("")}
      </div>
    </div>
  `;
}

function renderControl() {
  currentSlideIndex = getCurrentSlideIndex();
const slide = slides[currentSlideIndex];

  return `
    <div style="padding:40px;text-align:center">
      <h1>Show Controller</h1>

      <div style="font-size:1.5rem;margin:30px">
  Slide ${currentSlideIndex + 1} of ${slides.length}
</div>

<div style="font-size:1.5rem;margin:30px">
  Current: Round ${slide.round}
  ${
    slide.type === "title"
      ? slide.title
      : `${slide.type.toUpperCase()} ${slide.number}`
  }
<div>
  <button onclick="previousSlide()" style="font-size:2rem;padding:20px 40px;margin:10px">

function nextSlide() {
  currentSlideIndex = getCurrentSlideIndex();
  currentSlideIndex = Math.min(currentSlideIndex + 1, slides.length - 1);
  setCurrentSlideIndex(currentSlideIndex);
  render();
}

function previousSlide() {
  currentSlideIndex = getCurrentSlideIndex();
  currentSlideIndex = Math.max(currentSlideIndex - 1, 0);
  setCurrentSlideIndex(currentSlideIndex);
  render();
}
  function render() {
  const app = document.getElementById("app");

  if (isHost) {
    app.innerHTML = renderHost();
  } else if (isFinal) {
    app.innerHTML = renderFinalReveal();
  } else if (isShow) {
    app.innerHTML = renderShow();
  } else if (isControl) {
    app.innerHTML = renderControl();
  } else {
    app.innerHTML = renderDisplay();
  }
}

    socket.on("updateTeams", (data) => {

      if (Date.now() < suppressIncomingUntil) {
        return;
      }

      if (!teams.length) {
        restoreFromLocalIfNeeded();

function parseCSV(csvText) {
  const lines = csvText.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim());

  return lines.slice(1).map(line => {
    const values = line.split(",").map(v => v.trim());
    const row = {};

    headers.forEach((header, index) => {
      row[header.charAt(0).toLowerCase() + header.slice(1)] = values[index] || "";
    });

    return row;
  });
}

const csvText = await response.text();
const loadedRows = parseCSV(csvText);

slides = buildSlidesFromRows(loadedRows);
    render();
  } catch (error) {
    console.error("Could not load questions.json", error);
    render();
  }
}
