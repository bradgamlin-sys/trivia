<!DOCTYPE html>
<html>
<head>
  <title>Trivia Scoreboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }
    .team {
      font-size: 2em;
      margin: 10px;
    }
    input {
      font-size: 1.2em;
      margin: 5px;
    }
  </style>
</head>

<body>

<h1>Bald Guy Trivia 🧠</h1>

<div id="hostControls" style="display:none;">
  <button onclick="addTeam()">Add Team</button>
  <div id="teamInputs"></div>
</div>

<div id="display"></div>

<script>
const socket = io();
let teams = [];

const params = new URLSearchParams(window.location.search);
const isHost = params.get("view") === "host";

if (isHost) {
  document.getElementById("hostControls").style.display = "block";
}

function render() {
  const display = document.getElementById("display");
  display.innerHTML = "";

  const sorted = [...teams].sort((a,b) => b.score - a.score);

  sorted.forEach(t => {
    const div = document.createElement("div");
    div.className = "team";
    div.innerText = `${t.name}: ${t.score}`;
    display.appendChild(div);
  });

  if (isHost) {
    const inputs = document.getElementById("teamInputs");
    inputs.innerHTML = "";

    teams.forEach((t, i) => {
      const container = document.createElement("div");

      const name = document.createElement("input");
      name.value = t.name;
      name.oninput = () => updateTeam(i, name.value, score.value);

      const score = document.createElement("input");
      score.type = "number";
      score.value = t.score;
      score.oninput = () => updateTeam(i, name.value, score.value);

      container.appendChild(name);
      container.appendChild(score);
      inputs.appendChild(container);
    });
  }
}

function addTeam() {
  teams.push({ name: "Team", score: 0 });
  socket.emit("updateTeams", teams);
}

function updateTeam(i, name, score) {
  teams[i] = { name, score: parseInt(score) || 0 };
  socket.emit("updateTeams", teams);
}

socket.on("updateTeams", (data) => {
  teams = data;
  render();
});
</script>

</body>
</html>
