




<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bald Guy Trivia Scoreboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Montserrat:wght@500;700;800;900&family=Rye&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --panel: #121212;
      --panel-2: #1a1a1a;
      --line: #2d2d2d;
      --text: #f5f5f5;
      --muted: #b8b8b8;
      --accent: #f5c542;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Montserrat", Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      padding: 20px;
    }

    .display-wrap, .host-wrap {
      max-width: 1500px;
      margin: 0 auto;
    }

    .title {
      text-align: center;
      font-size: clamp(2.4rem, 5.8vw, 4.5rem);
      font-weight: 800;
      color: var(--accent);
      margin: 8px 0 6px;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.3rem);
      margin-bottom: 18px;
    }

    .board {
      background: linear-gradient(180deg, #181818, #0d0d0d);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0,0,0,0.35);
    }

    .board-header,
    .board-row {
      display: grid;
      grid-template-columns: 90px 1.8fr repeat(7, 1fr) 1fr;
      gap: var(--board-gap, 8px);
      align-items: center;
      padding: var(--board-row-padding, 14px 16px);
    }

    .board-header {
      background: #202020;
      font-weight: 700;
      color: var(--accent);
      border-bottom: 1px solid var(--line);
      font-size: var(--board-header-font, clamp(0.9rem, 1.5vw, 1.2rem));
    }

    .board-row {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: var(--board-row-font, clamp(1.1rem, 2vw, 1.7rem));
      min-height: var(--board-row-min-height, 70px);
    }

    .board-row:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }

    .rank {
      font-weight: 800;
      font-size: var(--board-rank-font, clamp(1.2rem, 2.3vw, 1.9rem));
    }

    .team-name {
      font-weight: 700;
      word-break: break-word;
      font-size: var(--board-team-font, clamp(1.15rem, 2.1vw, 1.8rem));
    }

    .total-cell {
      font-weight: 800;
      color: var(--accent);
      font-size: var(--board-total-font, clamp(1.2rem, 2.2vw, 1.9rem));
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 48px 20px;
      font-size: 1.2rem;
    }

    .host-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .host-top {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #2f2f2f;
      color: var(--text);
      border: 1px solid #444;
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    .host-note {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .restore-note {
      color: #9ed89e;
      font-size: 0.95rem;
    }

   

    .panel {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1050px;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #1f1f1f;
      color: var(--accent);
      z-index: 2;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: center;
      vertical-align: middle;
    }

    td:nth-child(2), th:nth-child(2) {
      text-align: left;
      min-width: 200px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 1rem;
      outline: none;
    }

    input[type="number"] {
      text-align: center;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .total-host {
      font-weight: 800;
      color: var(--accent);
    }

 

    @media (max-width: 1100px) {
      .two-col { grid-template-columns: 1fr; }
      .leaderboard-mini .board-header,
      .leaderboard-mini .board-row {
        grid-template-columns: 72px 1.6fr 90px;
      }
    }

    @media (max-width: 900px) {
      .page { padding: 12px; }
      .board-header,
      .board-row {
        grid-template-columns: 70px 1.4fr repeat(7, 0.95fr) 0.95fr;
        gap: 6px;
        padding: 10px 8px;
      }
    }

 .final-reveal-stage {
  min-height: 62vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 14px;
}

.final-reveal-row {
  display: grid;
 grid-template-columns: 120px 1fr repeat(7, 70px) 120px;
  align-items: center;
  gap: 20px;
  background: linear-gradient(180deg, #181818, #0d0d0d);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 18px 24px;
  font-size: clamp(1.8rem, 3.4vw, 3.4rem);
  box-shadow: 0 8px 28px rgba(0,0,0,0.3);
}

.final-reveal-place {
  color: var(--accent);
  font-weight: 900;
}

.final-reveal-team {
  font-weight: 800;
  word-break: break-word;
}

.final-reveal-total {
  color: var(--accent);
  font-weight: 900;
  text-align: right;
}

.final-reveal-controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
}
 .logo-container {
  text-align: center;
  margin-bottom: 10px;
}

.logo {
  max-height: 140px;
  max-width: 400px;
  width: auto;
}
.header-brand {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin: 10px 0;
}

.logo-side {
  height: 90px;
  width: auto;
}


/* Controller overlay menus */
.control-shell {
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
}

.control-row {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin: 22px 0;
}

.control-button-large {
  font-size: 2rem;
  padding: 20px 40px;
  margin: 6px;
}

.control-button-prev {
  background: #b83a3a;
  color: #fff;
  min-width: 220px;
  padding: 20px 34px;
}

.control-button-next {
  background: #28a745;
  color: #fff;
  min-width: 290px;
  padding: 22px 52px;
  font-size: 2.15rem;
}

.control-button-prev:hover,
.control-button-next:hover {
  filter: brightness(1.08);
}

.control-button-medium {
  font-size: 1.25rem;
  padding: 14px 24px;
  margin: 6px;
}

.jump-overlay-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.78);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.jump-overlay-panel {
  width: min(720px, 94vw);
  max-height: 88vh;
  overflow-y: auto;
  background: linear-gradient(180deg, #1b1b1b, #0d0d0d);
  border: 1px solid var(--line);
  border-radius: 22px;
  box-shadow: 0 20px 80px rgba(0,0,0,.7);
  padding: 28px;
  animation: overlayFadeIn .16s ease-out;
}

.jump-overlay-title {
  color: var(--accent);
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 900;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

.jump-overlay-button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 18px 20px;
  font-size: clamp(1.2rem, 3vw, 1.7rem);
  text-align: left;
  border-radius: 14px;
  background: #242424;
  color: var(--text);
  border: 1px solid #3d3d3d;
}

.jump-overlay-button:hover,
.jump-overlay-button:focus {
  background: var(--accent);
  color: #111;
}

.jump-overlay-cancel {
  margin-top: 22px;
  width: 100%;
  font-size: 1.25rem;
  padding: 16px;
}

@keyframes overlayFadeIn {
  from { opacity: 0; transform: scale(.97); }
  to { opacity: 1; transform: scale(1); }
}

/* Full-screen special pages */
.special-page {
  min-height: calc(100vh - 40px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}

.special-kicker {
  color: var(--accent);
  font-size: clamp(1.4rem, 2.5vw, 2.2rem);
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.special-title {
  color: var(--text);
  font-size: clamp(4rem, 9vw, 8rem);
  font-weight: 950;
  line-height: .95;
  margin-bottom: 20px;
}

.special-subtitle {
  color: var(--muted);
  font-size: clamp(1.4rem, 3vw, 2.4rem);
  font-weight: 700;
  margin-bottom: 26px;
}

.category-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  width: min(900px, 92vw);
  margin: 12px auto 0;
  text-align: center;
  text-align: center;
max-width: 900px;
}

.category-line {
  display: grid;
  grid-template-columns: 70px 1fr;
  gap: 16px;
  align-items: baseline;
  font-size: clamp(1.2rem, 2.6vw, 2rem);
}

.category-number {
  color: var(--accent);
  font-weight: 900;
  text-align: right;
}

.rules-list {
  width: min(1150px, 94vw);
  margin: 26px auto 0;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.rule-card {
  background: rgba(255,255,255,.045);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 18px;
  padding: 18px 24px;
  font-size: clamp(1.15rem, 2.2vw, 1.8rem);
  line-height: 1.18;
  text-align: center;
max-width: 900px;
}

.podium-stage {
  width: min(1200px, 94vw);
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  margin-top: 24px;
}

.podium-row {
  display: grid;
  grid-template-columns: 140px 1fr;
  align-items: center;
  gap: 24px;
  background: linear-gradient(180deg, #181818, #0d0d0d);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 22px 28px;
  box-shadow: 0 10px 32px rgba(0,0,0,.35);
}

.podium-medal {
  font-size: clamp(3rem, 6vw, 5rem);
  text-align: center;
}

.podium-team {
  text-align: left;
  font-size: clamp(2rem, 4vw, 4rem);
  font-weight: 950;
}

.podium-placeholder {
  color: rgba(255,255,255,.25);
}

  

/* BGOS brick stage layout */
.stage-shell {
  height: 100vh;
  min-height: 0;
  padding: 30px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 330px;
  gap: 26px;
  overflow: hidden;
  background:
    linear-gradient(rgba(0,0,0,.22), rgba(0,0,0,.28)),
    url('/brick.png');
  background-size: cover;
  background-position: center;
}

.stage-board {
  height: calc(100vh - 60px);
  min-height: 0;
  background: rgba(0,0,0,.96);
  border: 4px solid var(--accent);
  box-shadow: 0 0 24px rgba(245,197,66,.25), 0 18px 60px rgba(0,0,0,.65);
  padding: 34px 52px 54px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  overflow: hidden;
}

.stage-board.centered {
  justify-content: center;
  align-items: center;
  text-align: center;
}

.stage-sidebar {
  height: calc(100vh - 60px);
  min-height: 0;
  background: transparent;
  display: grid;
  grid-template-rows: auto auto 1fr;
  gap: 18px;
  overflow: hidden;
}

.stage-progress {
  background: rgba(0,0,0,.72);
  border: 3px solid rgba(245,197,66,.85);
  box-shadow: 0 12px 28px rgba(0,0,0,.48);
  padding: 12px 14px;
}

.stage-progress-title {
  color: var(--accent);
  font-weight: 1000;
  font-size: .9rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  text-align: center;
  margin-bottom: 8px;
}

.stage-progress-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.stage-progress-item {
  display: grid;
  grid-template-columns: 24px 1fr;
  gap: 8px;
  align-items: center;
  color: rgba(255,255,255,.62);
  font-size: .9rem;
  line-height: 1.05;
}

.stage-progress-dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.55);
  background: rgba(255,255,255,.12);
}

.stage-progress-item.complete {
  color: rgba(255,255,255,.38);
}

.stage-progress-item.complete .stage-progress-dot {
  background: rgba(245,197,66,.45);
  border-color: rgba(245,197,66,.55);
}

.stage-progress-item.active {
  color: #fff;
  font-weight: 900;
}

.stage-progress-item.active .stage-progress-dot {
  background: var(--accent);
  border-color: #fff;
  box-shadow: 0 0 12px rgba(245,197,66,.8);
}

body.show-mode {
  overflow: hidden;
}

body.show-mode .page,
body.tv-mode .page {
  padding: 0;
  overflow: hidden;
}

body.tv-mode {
  cursor: none;
}

.stage-round-card {
  position: relative;
  margin-top: 12px;
  padding: 26px 18px 28px;
  text-align: center;
  background: #f4efe2;
  color: #111;
  border: 8px solid #1d1d1d;
  outline: 4px solid var(--accent);
  box-shadow:
    0 16px 32px rgba(0,0,0,.62),
    inset 0 0 0 3px rgba(0,0,0,.18);
  transform: rotate(.25deg);
}

.stage-round-card::before,
.stage-round-card::after {
  content: "";
  position: absolute;
  top: -28px;
  width: 6px;
  height: 30px;
  background: #1d1d1d;
  border-radius: 999px;
  box-shadow: 0 0 0 2px rgba(245,197,66,.45);
}

.stage-round-card::before { left: 58px; }
.stage-round-card::after { right: 58px; }

.stage-round-word {
  font-family: "Rye", "Bree Serif", Georgia, serif;
  font-weight: 400;
  color: #111;
  font-size: clamp(1.8rem, 2.8vw, 3rem);
  line-height: .9;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.stage-round-number {
  font-family: "Bree Serif", Georgia, serif;
  color: var(--accent);
  font-size: clamp(5.4rem, 8.5vw, 8rem);
  font-weight: 900;
  line-height: .82;
  margin: 12px 0 14px;
  -webkit-text-stroke: 2px #111;
  text-shadow: 0 4px 0 #111, 0 0 10px rgba(245,197,66,.4);
}

.stage-round-title {
  font-family: "Bree Serif", Georgia, serif;
  color: #111;
  font-weight: 900;
  font-size: clamp(1.55rem, 2.35vw, 2.35rem);
  line-height: 1.02;
  text-transform: uppercase;
  text-wrap: balance;
}

.stage-theme {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  background: #f4efe2;
  border: 8px solid #1d1d1d;
  outline: 4px solid rgba(245,197,66,.9);

.stage-theme img {

.stage-title-main {

.stage-intro-title {

  font-size: clamp(3.4rem, 6.4vw, 6.2rem);

  line-height: .92;
  text-transform: uppercase;
  text-shadow: 0 5px 0 rgba(0,0,0,.85);

}

.stage-intro-subtitle {

}

.stage-category-list {

.stage-category-line {

.stage-category-number {

.stage-rules-list {

.stage-rule-line {

.stage-rule-bullet {

.stage-question-list {

.stage-question-item {

}

.stage-question-item {

}

.stage-answer-text {
  color: #7CFF6B;

  font-size: 1.4em;
  font-weight: normal;

}

.stage-answer-hero-answer,

  color: #7CFF6B;
  font-family: "Rye", serif;
  font-weight: 400;
  text-transform: uppercase;
  text-shadow:
    0 2px 0 #000,
    0 0 12px rgba(124,255,107,.6);
}

.stage-answer-hero-answer {
  margin-top: 26px;
  font-size: 1.12em;

}

.stage-answer-list-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 28px;
  align-items: baseline;
}

.stage-answer-list-answer {
  font-size: 1.05em;
  color: #7CFF6B;
  white-space: nowrap;
  text-align: right;
}

.stage-image-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  width: 100%;
}

.stage-image-card {
  position: relative;
  background: #080808;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 10px;
  overflow: hidden;
  min-height: 250px;
}

.stage-image-number {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--accent);

function buildSlidesFromRounds(rounds) {
  const generatedSlides = [];
  const roundMap = new Map(
    rounds.map(round => [Number(round.round), round])
  );

  function getRound(roundNumber) {
    return roundMap.get(Number(roundNumber));
  }

  function isImageRound(round) {
    return Boolean(
      round &&
      round.questions.length &&
      round.questions.every(q => q.type === "imageRound")
    );
  }

  function isMusicRound(round) {
    return Boolean(
      round &&
      round.questions.length &&
      round.questions.every(
        q => String(q.type || "").toLowerCase() === "music"
      )
    );
  }

  function addRoundTitle(roundNumber, titleOverride = "") {
    const round = getRound(roundNumber);
    if (!round) return;

    generatedSlides.push({
      type: "title",
      round: round.round,
      title: titleOverride || round.title
    });
  }

  function addQuestionSection(roundNumber, options = {}) {
    const round = getRound(roundNumber);
    if (!round) return;

    addRoundTitle(roundNumber, options.titleOverride || "");

    if (options.titleOnly) return;

    if (isImageRound(round)) {
      generatedSlides.push({
        type: "imageRound",
        round: round.round,
        roundTitle: round.title,
        images: round.questions.map((item, index) => ({
          number: index + 1,
          media: item.media,
          answer: item.answer
        }))
      });
      return;
    }

    if (isMusicRound(round)) {
      // Music question rounds are run live from the title screen.
      return;
    }

    round.questions.forEach((item, index) => {
      const questionNumber = index + 1;

      generatedSlides.push({
        type: "questionHero",
        round: round.round,
        roundTitle: round.title,
        number: questionNumber,
        question: item.question,
        answer: item.answer
      });

      generatedSlides.push({
        type: "questionList",
        round: round.round,
        roundTitle: round.title,
        number: questionNumber,
        question: item.question,
        answer: item.answer
      });
    });
  }

  function addAnswerSection(roundNumber) {
    const round = getRound(roundNumber);
    if (!round) return;

    generatedSlides.push({
      type: "title",
      round: round.round,
      title: `${round.title} Answers`
    });

    if (isImageRound(round)) {
      const images = round.questions.map((item, index) => ({
        number: index + 1,
        media: item.media,
        answer: item.answer
      }));

      for (let revealCount = 0; revealCount <= images.length; revealCount++) {
        generatedSlides.push({
          type: "imageAnswerReveal",
          round: round.round,
          roundTitle: round.title,
          revealCount,
          images
        });
      }

      return;
    }

    round.questions.forEach((item, index) => {
      generatedSlides.push({
        type: "answerQuestion",
        round: round.round,
        roundTitle: round.title,
        number: index + 1,
        question: item.question,
        answer: item.answer
      });

      generatedSlides.push({
        type: "answerReveal",
        round: round.round,
        roundTitle: round.title,
        number: index + 1,
        question: item.question,
        answer: item.answer
      });
    });
  }

  function addScoreboard(label) {
    generatedSlides.push({
      type: "scoreboard",
      label
    });
  }

  /*
   * BGOS default live hosting flow:
   *
   * R1 questions
   * R2 questions
   * R3 title only (handout / grading)
   * R1 answers
   * R2 answers
   * Scores
   * R4 title only (music)
   * R3 answers
   * R4 title again (continue music)
   * R5 questions
   * R4 answers
   * R6 questions
   * R5 answers
   * R6 answers
   * Scores
   * R7 questions
   * R7 answers
   * End
   */

  addQuestionSection(1);
  addQuestionSection(2);

  addQuestionSection(3, { titleOnly: true });

  addAnswerSection(1);
  addAnswerSection(2);

  addScoreboard("Scores after Round 2");

  addQuestionSection(4, { titleOnly: true });

  addAnswerSection(3);

  addQuestionSection(4, { titleOnly: true });

  addQuestionSection(5);

  addAnswerSection(4);

  addQuestionSection(6);

  addAnswerSection(5);
  addAnswerSection(6);

  addScoreboard("Scores after Round 6");

  addQuestionSection(7);
  addAnswerSection(7);

  generatedSlides.push({
    type: "showEnd",
    title: "End of Show"
  });

  return generatedSlides;
}
function fitQuestionList() {
  if (!isShow) return;

  const board = document.querySelector(".stage-board");
  const list = document.querySelector(
    ".stage-running-question-list, .stage-running-answer-list"
  );

  if (!board || !list) return;

  const boardStyles = getComputedStyle(board);
  const paddingTop = parseFloat(boardStyles.paddingTop) || 0;
  const paddingBottom = parseFloat(boardStyles.paddingBottom) || 0;
  const safetySpace = 18;

  const availableHeight = Math.max(
    120,
    board.clientHeight - paddingTop - paddingBottom - safetySpace
  );

  let fontSize = 2.15;
  const minFontSize = 0.95;

  list.style.lineHeight = "1.22";
  list.style.paddingTop = "0.08em";
  list.style.paddingBottom = "0.22em";
  list.style.overflow = "visible";
  list.style.fontSize = `${fontSize}rem`;

  while (
    list.scrollHeight > availableHeight &&
    fontSize > minFontSize
  ) {
    fontSize -= 0.05;
    list.style.fontSize = `${fontSize}rem`;
  }
}

function fitScoreboard() {
  const board = document.querySelector(".scoreboard-board");
  if (!board) return;

  let font = 1.7;
  let headerFont = 1.2;
  let rowHeight = 70;
  let padY = 14;
  let padX = 16;
  let gap = 8;

  const minFont = 0.72;
  const availableHeight = window.innerHeight - board.getBoundingClientRect().top - 10;

  const apply = () => {
    board.style.setProperty("--board-row-font", `${font}rem`);
    board.style.setProperty("--board-rank-font", `${font * 1.08}rem`);
    board.style.setProperty("--board-team-font", `${font * 1.03}rem`);
    board.style.setProperty("--board-total-font", `${font * 1.08}rem`);
    board.style.setProperty("--board-header-font", `${headerFont}rem`);
    board.style.setProperty("--board-row-min-height", `${rowHeight}px`);
    board.style.setProperty("--board-row-padding", `${padY}px ${padX}px`);
    board.style.setProperty("--board-gap", `${gap}px`);
  };

  apply();

  while (board.scrollHeight > availableHeight && font > minFont) {
    font -= 0.05;
    headerFont = Math.max(0.62, headerFont - 0.035);
    rowHeight = Math.max(30, rowHeight - 3);
    padY = Math.max(3, padY - 1);
    padX = Math.max(6, padX - 1);
    gap = Math.max(3, gap - 0.5);
    apply();
  }
}
function buildSlidesFromRows(rows) {
  const groupedRounds = [];

  rows.forEach(row => {
    let round = groupedRounds.find(r => r.round === Number(row.roundOrder));

    if (!round) {
      round = {
        round: Number(row.roundOrder),
        title: row.round,
        questions: []
      };
      groupedRounds.push(round);
    }

    round.questions.push({
      type: row.type,
      question: row.question,
      answer: row.answer,
      media: row.media
    });
  });

  groupedRounds.sort((a, b) => a.round - b.round);

  return buildSlidesFromRounds(groupedRounds);
}

let teams = [];
   
    let draftTeams = [];
    let suppressIncomingUntil = 0;
    let lastRestoreMessage = "";

    function blankRounds() {
      return Array.from({ length: ROUND_COUNT }, () => 0);
    }

    function normalizeTeam(team, idx = 0) {
      let rounds = Array.isArray(team?.rounds) ? team.rounds.slice(0, ROUND_COUNT) : [];
      while (rounds.length < ROUND_COUNT) rounds.push(0);
      rounds = rounds.map(v => Number(v) || 0);
      return {
        id: team?.id || `${Date.now()}-${Math.random().toString(36).slice(2, 8)}-${idx}`,
        name: typeof team?.name === "string" ? team.name : `Team ${idx + 1}`,
        rounds
      };
    }

    function totalFor(team) {
      return (team.rounds || []).reduce((sum, val) => sum + (Number(val) || 0), 0);
    }

    function sortedTeams(source) {
      return [...source]
        .map(t => ({ ...t, total: totalFor(t) }))
        .sort((a, b) => {
          if (b.total !== a.total) return b.total - a.total;
          return a.name.localeCompare(b.name);
        });
    }

    function ascendingTeams(source) {
  return [...source]
    .map(t => ({ ...t, total: totalFor(t) }))
    .sort((a, b) => {
      if (a.total !== b.total) return a.total - b.total;
      return a.name.localeCompare(b.name);
    });
}

function getOrdinalSuffix(n) {
  if (n % 100 >= 11 && n % 100 <= 13) return "th";
  switch (n % 10) {
    case 1: return "st";
    case 2: return "nd";
    case 3: return "rd";
    default: return "th";
  }
}
    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (m) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[m]));
    }

    function saveLocalCopy() {
      if (!isHost) return;

    }

    function loadLocalCopy() {
      if (!isHost) return [];
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.map((t, i) => normalizeTeam(t, i));
      } catch (e) {
        return [];
      }
    }

    function syncDraftFromTeams() {
      draftTeams = teams.map((t, i) => normalizeTeam(t, i));

    function emitTeams() {

render();

function clampSlideIndex(index) {
  return Math.min(Math.max(Number(index) || 0, 0), Math.max(slides.length - 1, 0));
}


function saveRecoveryState(){
 if(!isControl) return;
 const state={gameState,finalRevealCount,podiumRevealCount,savedAt:Date.now()};
 localStorage.setItem(RECOVERY_KEY,JSON.stringify(state));
}
function loadRecoveryState(){
 if(!isControl) return;
 try{
  const raw=localStorage.getItem(RECOVERY_KEY);
  if(!raw) return;
  const rec=JSON.parse(raw);
  if(Date.now()-rec.savedAt>12*60*60*1000) return;
  if(confirm("Resume previous show?")){
    applyGameState(rec.gameState||{});
    finalRevealCount=rec.finalRevealCount||0;
    podiumRevealCount=rec.podiumRevealCount||0;
    socket.emit("gameState",gameState);
  }else{
    localStorage.removeItem(RECOVERY_KEY);
  }
 }catch(e){}
}

function applyGameState(updatedState = {}) {
  gameState = {
    ...gameState,
    ...updatedState
  };

  gameState.currentSlideIndex = clampSlideIndex(gameState.currentSlideIndex);
  gameState.displayMode = Object.values(DISPLAY_MODES).includes(gameState.displayMode)
    ? gameState.displayMode
    : DISPLAY_MODES.INTRO;

  finalRevealCount = Number(gameState.finalRevealCount) || 0;
  podiumRevealCount = Number(gameState.podiumRevealCount) || 0;
  currentSlideIndex = gameState.currentSlideIndex;
}

function emitGameState(update = {}) {
  applyGameState(update);
  saveRecoveryState();
  socket.emit("gameState", gameState);
  render();
}

const DISPLAY_MODES = {
  INTRO: "intro",
  RULES: "rules",
  GAME: "presentation",
  SCORES: "scores",
  FINAL: "final",
  PODIUM: "podium"
};

function getCurrentSlideIndex() {
  return clampSlideIndex(gameState.currentSlideIndex);
}

function setCurrentSlideIndex(index) {
  emitGameState({ currentSlideIndex: clampSlideIndex(index) });
}

function getDisplayMode() {
  return gameState.displayMode || DISPLAY_MODES.INTRO;
}

function setDisplayMode(mode) {
  if (!Object.values(DISPLAY_MODES).includes(mode)) {
    mode = DISPLAY_MODES.INTRO;
  }

  emitGameState({ displayMode: mode });
}
function getRoundCategories() {
  const seenRounds = new Set();

  return getQuestionTitleSlides()
    .filter(slide => {
      const roundNumber = Number(slide.round);

      if (seenRounds.has(roundNumber)) return false;

      seenRounds.add(roundNumber);
      return true;
    })
    .map(slide => ({
      round: slide.round,
      title: String(slide.title || "")
    }));
}

function stripAnswerSuffix(title) {
  return String(title || "").replace(/\s*Answers$/i, "");
}

function renderStageProgress(activeRound = "") {
  const rounds = getQuestionTitleSlides();
  const activeNumber = Number(activeRound);

  if (!rounds.length || !Number.isFinite(activeNumber)) return "";

  return `
    <div class="stage-progress">
      <div class="stage-progress-title">Tonight's Rounds</div>
      <div class="stage-progress-list">
        ${rounds.map(slide => {
          const roundNumber = Number(slide.round);
          const state = roundNumber === activeNumber
            ? "active"
            : roundNumber < activeNumber
              ? "complete"
              : "";

          return `
            <div class="stage-progress-item ${state}">
              <div class="stage-progress-dot"></div>
              <div>${escapeHtml(slide.round)}. ${escapeHtml(stripAnswerSuffix(slide.title))}</div>
            </div>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

  const cleanTitle = stripAnswerSuffix(title);

function renderImageGrid(currentSlide, revealCount = 0) {
  const content = `
    <div class="stage-image-grid">

        const revealed = img.number <= revealCount;
        return `
          <div class="stage-image-card">
            <div class="stage-image-number">${escapeHtml(img.number)}</div>
            <img src="/images/${escapeHtml(img.media)}" alt="Picture ${escapeHtml(img.number)}">
            ${revealed ? `<div class="stage-image-answer">${escapeHtml(img.answer)}</div>` : ""}

      }).join("")}

  return renderStageShell({

    title: currentSlide.roundTitle,

  });

function chunkArray(items, size) {
  const chunks = [];
  for (let i = 0; i < items.length; i += size) {
    chunks.push(items.slice(i, i + size));
  }
  return chunks;
}

function getPrintableImages() {
  const imageSlides = slides.filter(slide => slide.type === "imageRound");
  return imageSlides.flatMap(slide => (slide.images || []).map(img => ({
    ...img,
    round: slide.round,
    roundTitle: slide.roundTitle
  })));
}

const slideRenderers = {
  title: renderTitleSlide,
  questionHero: renderQuestionHeroSlide,
  questionList: renderQuestionListSlide,
  imageRound: renderImageRoundSlide,
  imageAnswerReveal: renderImageAnswerRevealSlide,
  answerQuestion: renderAnswerQuestionSlide,
  answerReveal: renderAnswerRevealSlide,
  answerList: renderAnswerListSlide,
  scoreboard: renderScoreboardSlide,
  showEnd: renderShowEndSlide
};

function renderShow() {
  currentSlideIndex = getCurrentSlideIndex();
  const displayMode = getDisplayMode();
  const currentSlide = slides[currentSlideIndex];

  if (displayMode === DISPLAY_MODES.INTRO) {
    return renderIntroPage();
  }

  if (displayMode === DISPLAY_MODES.RULES) {
    return renderRulesPage();
  }

  if (displayMode === DISPLAY_MODES.SCORES) {
    return renderDisplay();
  }

  if (displayMode === DISPLAY_MODES.FINAL) {
    return renderFinalReveal();
  }

  if (displayMode === DISPLAY_MODES.PODIUM) {
    return renderPodiumPage();
  }

  if (!currentSlide) {
    return `<div class="empty-state">No slide found.</div>`;
  }

  const renderer = slideRenderers[currentSlide.type];

  if (renderer) {
    return renderer(currentSlide);
  }

  return `<div class="empty-state">No renderer found for slide type: ${escapeHtml(currentSlide.type)}</div>`;
}

function getQuestionTitleSlides() {
  return slides.filter(slide =>
    slide.type === "title" &&
    !String(slide.title || "").endsWith("Answers")
  );
}

function getAnswerTitleSlides() {
  return slides.filter(slide =>
    slide.type === "title" &&
    String(slide.title || "").endsWith("Answers")
  );
}

function renderJumpOverlay() {
  if (!controlOverlayMode) return "";

  const isAnswers = controlOverlayMode === "answers";
  const title = isAnswers ? "Answers" : "Questions";
  const titleSlides = isAnswers ? getAnswerTitleSlides() : getQuestionTitleSlides();

  return `
    <div class="jump-overlay-backdrop" onclick="closeJumpOverlay()">
      <div class="jump-overlay-panel" onclick="event.stopPropagation()">
        <div class="jump-overlay-title">${title}</div>

        ${titleSlides.map(titleSlide => {
          const index = slides.indexOf(titleSlide);
          const cleanTitle = String(titleSlide.title || "").replace(/\s*Answers$/, "");

          return `
            <button class="jump-overlay-button" onclick="jumpToSlideFromOverlay(${index})">
              Round ${escapeHtml(titleSlide.round)} — ${escapeHtml(cleanTitle)}
            </button>
          `;
        }).join("")}

        <button class="secondary jump-overlay-cancel" onclick="closeJumpOverlay()">
          Cancel
        </button>
      </div>
    </div>
  `;
}

function getDisplayModeLabel(mode) {
  switch (mode) {
    case DISPLAY_MODES.INTRO: return "INTRO";
    case DISPLAY_MODES.RULES: return "RULES";
    case DISPLAY_MODES.GAME: return "GAME";
    case DISPLAY_MODES.SCORES: return "SCORES";
    case DISPLAY_MODES.FINAL: return "FINAL REVEAL";
    case DISPLAY_MODES.PODIUM: return "PODIUM";
    default: return String(mode || "").toUpperCase();
  }
}

function getCurrentLabel(slide, displayMode) {
  if (displayMode === DISPLAY_MODES.INTRO) return "Intro Screen";
  if (displayMode === DISPLAY_MODES.RULES) return "Rules Screen";
  if (displayMode === DISPLAY_MODES.SCORES) return "Live Leaderboard";
  if (displayMode === DISPLAY_MODES.FINAL) return `Final Reveal — ${finalRevealCount} revealed`;
  if (displayMode === DISPLAY_MODES.PODIUM) return `Podium — ${podiumRevealCount}/3 medals revealed`;
  if (!slide) return "No slide loaded";

  if (slide.type === "title") return `Round ${slide.round} — ${escapeHtml(slide.title)}`;
  if (slide.type === "imageAnswerReveal") return `Round ${slide.round} — Reveal ${slide.revealCount}/${slide.images.length}`;
  if (slide.type === "imageRound") return `Round ${slide.round} — Picture Round`;

  return `${escapeHtml(slide.type.toUpperCase())} ${escapeHtml(slide.number || "")}`;
}


function getNextActionLabel() {
  const next = slides[getCurrentSlideIndex()+1];
  if (!next) return "End of Show";
  switch(next.type){
    case "questionHero": return `Show Question ${next.number}`;
    case "questionList": return "Add to List";
    case "answerQuestion": return `Show Answer Question ${next.number}`;
    case "answerReveal": return `Reveal Answer ${next.number}`;
    case "answerList": return "Add Answer to List";
    case "title": return String(next.title||"Next Round");
    case "imageRound": return "Show Picture Round";
    case "imageAnswerReveal": return next.revealCount===0?"Start Picture Answers":`Reveal Picture ${next.revealCount}`;
    case "scoreboard": return next.label || "Show Scores";
    case "showEnd": return "End of Show";
    default: return "Next";
  }
}

function fitQuestionText() {
  if (!isShow) return;

  const container = document.querySelector(".question-container");
  if (!container) return;

  const board = container.closest(".stage-board");
  if (!board) return;

  const boardStyles = getComputedStyle(board);
  const paddingTop = parseFloat(boardStyles.paddingTop) || 0;
  const paddingRight = parseFloat(boardStyles.paddingRight) || 0;
  const paddingBottom = parseFloat(boardStyles.paddingBottom) || 0;
  const paddingLeft = parseFloat(boardStyles.paddingLeft) || 0;
  const safetySpace = 14;

  container.style.lineHeight = "1.12";
  container.style.paddingTop = "0.08em";
  container.style.paddingBottom = "0.18em";
  container.style.overflow = "visible";

  let low = 0.9;
  let high = 6.5;
  let best = low;

  function textFits() {
    const boardRect = board.getBoundingClientRect();
    const textRect = container.getBoundingClientRect();

    const innerTop = boardRect.top + paddingTop + safetySpace;
    const innerRight = boardRect.right - paddingRight - safetySpace;
    const innerBottom = boardRect.bottom - paddingBottom - safetySpace;
    const innerLeft = boardRect.left + paddingLeft + safetySpace;

    return (
      textRect.top >= innerTop &&
      textRect.left >= innerLeft &&
      textRect.right <= innerRight &&
      textRect.bottom <= innerBottom &&
      container.scrollHeight <= container.clientHeight + 2 &&
      container.scrollWidth <= container.clientWidth + 2
    );
  }

  for (let i = 0; i < 20; i++) {
    const mid = (low + high) / 2;
    container.style.fontSize = `${mid}rem`;

    if (textFits()) {
      best = mid;
      low = mid;
    } else {
      high = mid;
    }
  }

  container.style.fontSize = `${Math.max(0.9, best - 0.08)}rem`;
}


  
function validateGame(){
  const issues=[];
  const warnings=[];
  rounds.forEach((round,rIdx)=>{
    if(!round.title || !String(round.title).trim()){
      issues.push(`Round ${rIdx+1}: Missing title`);
    }
    round.questions.forEach((q,qIdx)=>{
      if(!q.question || !String(q.question).trim()){
        issues.push(`R${rIdx+1} Q${qIdx+1}: Missing question`);
      }
      if(q.answer===undefined || String(q.answer).trim()===""){
        issues.push(`R${rIdx+1} Q${qIdx+1}: Missing answer`);
      }
      if(q.type==="imageRound" && (!q.media || !String(q.media).trim())){
        issues.push(`R${rIdx+1} Picture ${qIdx+1}: Missing image filename`);
      }
      if(q.hostNote!==undefined && String(q.hostNote).trim()===""){
        warnings.push(`R${rIdx+1} Q${qIdx+1}: Blank host note`);
      }
    });
  });

  let msg=`BGOS Validation\n\n`;
  if(issues.length===0){
    msg+="✅ READY TO HOST\n\n";
  }else{
    msg+="❌ NOT READY\n\n";
  }
  if(issues.length){
    msg+="Errors:\n"+issues.map(i=>"• "+i).join("\n")+"\n\n";
  }
  if(warnings.length){
    msg+="Warnings:\n"+warnings.map(w=>"• "+w).join("\n");
  }
  if(!issues.length && !warnings.length){
    msg+="No issues found.";
  }
  alert(msg);
}

function parseCSV(csvText) {
  const rows = [];
  let currentRow = [];
  let currentValue = "";
  let insideQuotes = false;

  for (let i = 0; i < csvText.length; i++) {
    const char = csvText[i];
    const nextChar = csvText[i + 1];

    if (char === '"') {
      if (insideQuotes && nextChar === '"') {
        currentValue += '"';
        i++;
      } else {
        insideQuotes = !insideQuotes;
      }
      continue;
    }

    if (char === "," && !insideQuotes) {
      currentRow.push(currentValue.trim());
      currentValue = "";
      continue;
    }

    if ((char === "\n" || char === "\r") && !insideQuotes) {
      if (char === "\r" && nextChar === "\n") i++;
      currentRow.push(currentValue.trim());
      currentValue = "";

      if (currentRow.some(value => value !== "")) {
        rows.push(currentRow);
      }

      currentRow = [];
      continue;
    }

    currentValue += char;
  }

  currentRow.push(currentValue.trim());
  if (currentRow.some(value => value !== "")) {
    rows.push(currentRow);
  }

  const headers = (rows.shift() || []).map(header => header.trim());

  return rows.map(values => {
    const row = {};

    headers.forEach((header, index) => {
      const key = header.charAt(0).toLowerCase() + header.slice(1);
      row[key] = values[index] || "";
    });

    return row;
  });
}

document.addEventListener("keydown", (event) => {
  if ((event.key === "f" || event.key === "F") && (isShow || isControl)) {
    toggleFullscreen();
    return;
  }

  if (!isControl) return;

  if (event.key === "Escape" && controlOverlayMode) {
    closeJumpOverlay();
    return;
  }

  if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") {
    event.preventDefault();
    nextSlide();
    return;
  }

  if (event.key === "ArrowLeft" || event.key === "PageUp") {
    event.preventDefault();
    previousSlide();
    return;
  }
});

let touchStartX = 0;

document.addEventListener("touchstart", (e) => {
  if (!isControl) return;

  touchStartX = e.changedTouches[0].clientX;
});

document.addEventListener("touchend", (e) => {
  if (!isControl) return;

  const touchEndX = e.changedTouches[0].clientX;
  const distance = touchEndX - touchStartX;

  if (Math.abs(distance) < 75) return;

  if (distance < 0) {
    nextSlide();      // swipe left
  } else {
    previousSlide();  // swipe right
  }
